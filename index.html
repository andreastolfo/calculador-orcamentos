<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças André & Ângela</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen" class="modal">
        <div class="login-box">
            <h2>💰 Cofre da Família</h2>
            
            <div id="step-password">
                <p>Digite a senha de acesso:</p>
                <input type="password" id="senha-master" placeholder="Senha">
                <button onclick="verificarSenha()">Entrar</button>
            </div>

            <div id="step-profiles" style="display:none;">
                <p>Quem está acessando agora?</p>
                <button onclick="fazerLogin('André')" class="btn-user">André</button>
                <button onclick="fazerLogin('Ângela')" class="btn-user">Ângela</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="user-info">
                <span>Olá, <strong id="nome-usuario"></strong></span>
                <button onclick="logout()" class="btn-link">Sair</button>
            </div>
            <h1>Fluxo de Caixa Familiar</h1>
        </header>

        <div class="summary-cards">
            <div class="card income">
                <h3>Receitas</h3>
                <p id="total-receitas">R$ 0,00</p>
            </div>
            <div class="card expenses">
                <h3>Despesas</h3>
                <p id="total-despesas">R$ 0,00</p>
            </div>
            <div class="card balance">
                <h3>Saldo Consolidado</h3>
                <p id="saldo-geral">R$ 0,00</p>
            </div>
        </div>

        <main class="grid-layout">
            <section class="form-container">
                <h3>Lançamento Rápido</h3>
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="desc" placeholder="Ex: Mercado, Salário...">
                    
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="despesa">Despesa (Gasto)</option>
                        <option value="receita">Receita (Ganho)</option>
                    </select>

                    <label>Categoria</label>
                    <select id="categoria">
                        <option value="Moradia">Moradia</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Investimentos">Investimentos</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Outros">Outros</option>
                    </select>

                    <label>Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" placeholder="0.00">
                    
                    <button onclick="adicionarRegistro()" class="btn-primary">Lançar</button>
                </div>
            </section>

            <div class="visual-area">
                <div class="chart-box">
                    <canvas id="graficoFinancas"></canvas>
                </div>
                <div class="table-box">
                    <table>
                        <thead>
                            <tr>
                                <th>Autor</th>
                                <th>Status</th>
                                <th>Item</th>
                                <th>Valor</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-transacoes"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
