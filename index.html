<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Compartilhadas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Tela de Login Simples -->
    <div id="login-screen" class="modal">
        <div class="login-box">
            <h2>Quem está acessando?</h2>
            <button onclick="fazerLogin('Usuário')">Acessar como Usuário</button>
            <button onclick="fazerLogin('Esposa')">Acessar como Esposa</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div class="user-info">
                <span>Olá, <strong id="nome-usuario"></strong></span>
                <button onclick="logout()" class="btn-link">Sair</button>
            </div>
            <h1>Dashboard Financeiro 30+</h1>
        </header>

        <div class="summary-cards">
            <div class="card income">
                <h3>Receitas</h3>
                <p id="total-receitas">R$ 0,00</p>
            </div>
            <div class="card expenses">
                <h3>Despesas</h3>
                <p id="total-despesas">R$ 0,00</p>
            </div>
            <div class="card balance">
                <h3>Saldo Atual</h3>
                <p id="saldo-geral">R$ 0,00</p>
            </div>
        </div>

        <main class="grid-layout">
            <section class="form-container">
                <h3>Novo Lançamento</h3>
                <div class="form-group">
                    <input type="text" id="desc" placeholder="Ex: Aluguel, Supermercado...">
                    <select id="tipo">
                        <option value="despesa">Despesa (Gasto)</option>
                        <option value="receita">Receita (Ganho)</option>
                    </select>
                    <select id="categoria">
                        <option value="Moradia">Moradia</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Lazer">Lazer/Viagens</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Investimentos">Investimentos</option>
                        <option value="Outros">Outros</option>
                    </select>
                    <input type="number" id="valor" placeholder="R$ 0,00">
                    <button onclick="adicionarRegistro()" class="btn-primary">Lançar</button>
                </div>
            </section>

            <div class="charts-and-table">
                <div class="chart-box">
                    <canvas id="graficoFinancas"></canvas>
                </div>
                <div class="table-box">
                    <table>
                        <thead>
                            <tr>
                                <th>Autor</th>
                                <th>Item</th>
                                <th>Valor</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-transacoes"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
